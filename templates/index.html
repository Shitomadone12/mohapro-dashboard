<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MOHA PRO - Bot Dashboard</title>
    <style>
        /* Qaab dhismeedka guud */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0b0b14;
            color: #e0e0e0;
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: linear-gradient(145deg, #16162a, #1e1e36);
            padding: 20px 16px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #d4af37;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.1);
        }
        .header h1 {
            color: #d4af37;
            font-size: 24px;
            letter-spacing: 2px;
            font-weight: 700;
        }
        .header .sub {
            color: #8888aa;
            font-size: 12px;
            margin-top: 4px;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-badge.on {
            background: #00c853;
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 200, 83, 0.3);
        }
        .status-badge.off {
            background: #d32f2f;
            color: #fff;
            box-shadow: 0 0 15px rgba(211, 47, 47, 0.3);
        }

        /* Grid-ka 4-da card */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .card {
            background: #141425;
            padding: 16px 12px;
            border-radius: 16px;
            border: 1px solid #252540;
            text-align: center;
            transition: all 0.2s;
        }
        .card .label {
            font-size: 10px;
            color: #7777aa;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .card .value {
            font-size: 22px;
            font-weight: 700;
            margin-top: 4px;
        }
        .value.green { color: #69f0ae; }
        .value.red { color: #ff5252; }
        .value.gold { color: #d4af37; }
        .value.blue { color: #40c4ff; }

        /* Section-ka ganacsiga */
        .section-box {
            background: #141425;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #252540;
        }
        .section-box h3 {
            color: #d4af37;
            font-size: 14px;
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .trade-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1e1e35;
            font-size: 13px;
        }
        .trade-item:last-child { border-bottom: none; }
        .trade-item .type.buy { color: #69f0ae; }
        .trade-item .type.sell { color: #ff5252; }

        /* Strategy Buttons */
        .strat-selector {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .strat-btn {
            flex: 1 0 auto;
            padding: 8px 10px;
            border-radius: 30px;
            border: 1px solid #2a2a4a;
            background: transparent;
            color: #8888bb;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            min-width: 40px;
        }
        .strat-btn.active {
            border-color: #d4af37;
            color: #d4af37;
            background: #1a1a30;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
        .strat-btn:active { transform: scale(0.95); }

        /* Control Buttons */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .btn {
            padding: 14px 0;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            letter-spacing: 0.5px;
        }
        .btn:active { transform: scale(0.94); }
        .btn-start { background: #00c853; color: #fff; }
        .btn-start:active { background: #009624; }
        .btn-stop { background: #d32f2f; color: #fff; }
        .btn-stop:active { background: #9a0007; }
        .btn-close { background: #ff6f00; color: #fff; }
        .btn-close:active { background: #c43e00; }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 11px;
            color: #444466;
            margin-top: 20px;
            padding-bottom: 10px;
        }
        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00e676;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            margin-right: 6px;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        .footer .time { color: #666688; }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            color: #555577;
            font-size: 13px;
            padding: 12px 0;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <h1>⚡ MOHA PRO</h1>
        <div class="sub">Bot Control Dashboard</div>
        <div id="statusBadge" class="status-badge off">● OFFLINE</div>
    </div>

    <!-- 4 Cards -->
    <div class="grid-2">
        <div class="card">
            <div class="label">💰 Balance</div>
            <div class="value gold" id="balance">$0.00</div>
        </div>
        <div class="card">
            <div class="label">📊 Equity</div>
            <div class="value gold" id="equity">$0.00</div>
        </div>
        <div class="card">
            <div class="label">📈 Profit</div>
            <div class="value green" id="profit">$0.00</div>
        </div>
        <div class="card">
            <div class="label">🏆 Win Rate</div>
            <div class="value blue" id="winrate">0%</div>
        </div>
    </div>

    <!-- Additional Stats -->
    <div class="grid-2" style="margin-bottom:16px;">
        <div class="card">
            <div class="label">📉 Drawdown</div>
            <div class="value red" id="drawdown">0%</div>
        </div>
        <div class="card">
            <div class="label">🔄 Open Trades</div>
            <div class="value blue" id="opentrades">0</div>
        </div>
    </div>

    <!-- Strategy Selector -->
    <div class="strat-selector" id="stratSelector">
        <button class="strat-btn" data-strat="SR">SR</button>
        <button class="strat-btn" data-strat="BB">BB</button>
        <button class="strat-btn" data-strat="EMA">EMA</button>
        <button class="strat-btn active" data-strat="SMC">SMC</button>
        <button class="strat-btn" data-strat="VSA">VSA</button>
        <button class="strat-btn" data-strat="RSI">RSI</button>
    </div>

    <!-- Control Buttons -->
    <div class="controls">
        <button class="btn btn-start" id="btnStart">▶ START</button>
        <button class="btn btn-stop" id="btnStop">⏹ STOP</button>
        <button class="btn btn-close" id="btnClose">✕ CLOSE</button>
    </div>

    <!-- Open Trades Section -->
    <div class="section-box">
        <h3>📋 Open Trades</h3>
        <div id="tradesList">
            <div class="empty-state">No open trades</div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <span class="live-dot"></span> LIVE 
        <span id="lastUpdate" class="time">--:--:--</span>
        <br>
        <span style="color:#333355;">v2.0 | Powered by Moha Pro</span>
    </div>
</div>

<script>
    // ============================================================
    // 1. Soo dir xogta (5 seconds mar)
    // ============================================================
    async function fetchStatus() {
        try {
            const res = await fetch('/api/status');
            if (!res.ok) throw new Error('Network error');
            const data = await res.json();
            updateUI(data);
        } catch (e) {
            console.warn('Fetch failed:', e);
        }
    }

    function updateUI(data) {
        document.getElementById('balance').textContent = '$' + (data.balance || 0).toFixed(2);
        document.getElementById('equity').textContent = '$' + (data.equity || 0).toFixed(2);
        
        const profit = data.profit || 0;
        const profitEl = document.getElementById('profit');
        profitEl.textContent = (profit >= 0 ? '+' : '') + '$' + profit.toFixed(2);
        profitEl.style.color = profit >= 0 ? '#69f0ae' : '#ff5252';
        
        document.getElementById('winrate').textContent = (data.winrate || 0).toFixed(1) + '%';
        document.getElementById('drawdown').textContent = (data.drawdown || 0).toFixed(1) + '%';
        document.getElementById('opentrades').textContent = data.opentrades || 0;

        // Status Badge
        const badge = document.getElementById('statusBadge');
        const isActive = (data.status === 'STARTED' || data.status === 'RUNNING' || data.status === 'ON');
        badge.textContent = isActive ? '● ONLINE' : '● OFFLINE';
        badge.className = 'status-badge ' + (isActive ? 'on' : 'off');

        // Last Update
        if (data.lastUpdate) {
            const d = new Date(data.lastUpdate);
            document.getElementById('lastUpdate').textContent = d.toLocaleTimeString();
        }

        // Strategy Highlight
        document.querySelectorAll('.strat-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.strat === data.strategy);
        });

        // Trades list (haddii aad rabto in aad soo bandhigto, backend waa inuu soo celiyaa array 'trades')
        // Hadda, haddii uu jiro, waxaan soo bandhigi karnaa tusaale ahaan.
        if (data.trades && data.trades.length > 0) {
            let html = '';
            data.trades.forEach(t => {
                const typeClass = t.type === 'BUY' ? 'buy' : 'sell';
                html += `<div class="trade-item">
                    <span class="type ${typeClass}">${t.type}</span>
                    <span>${t.symbol}</span>
                    <span>${t.lot}</span>
                    <span style="color:${t.profit >= 0 ? '#69f0ae' : '#ff5252'}">${t.profit}</span>
                </div>`;
            });
            document.getElementById('tradesList').innerHTML = html;
        } else {
            document.getElementById('tradesList').innerHTML = '<div class="empty-state">No open trades</div>';
        }
    }

    // ============================================================
    // 2. Dir amar (Command)
    // ============================================================
    async function sendCommand(command) {
        try {
            const res = await fetch('/api/send-command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command })
            });
            const result = await res.json();
            if (result.status === 'ok') {
                // Guul
                fetchStatus(); // Cusboonaysii xogta si degdeg ah
            } else {
                alert('Error: ' + (result.error || 'Unknown'));
            }
        } catch (e) {
            alert('Network error: ' + e.message);
        }
    }

    // ============================================================
    // 3. Dhageyso Buttons
    // ============================================================
    document.getElementById('btnStart').addEventListener('click', () => sendCommand('START'));
    document.getElementById('btnStop').addEventListener('click', () => sendCommand('STOP'));
    document.getElementById('btnClose').addEventListener('click', () => sendCommand('CLOSE_ALL'));

    document.querySelectorAll('.strat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const strat = btn.dataset.strat;
            sendCommand('STRATEGY:' + strat);
        });
    });

    // ============================================================
    // 4. Bilow (Start)
    // ============================================================
    fetchStatus();
    setInterval(fetchStatus, 5000); // 5 seconds
</script>
</body>
</html>
