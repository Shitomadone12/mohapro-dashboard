<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>MOHA PRO V31 - Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #0a0e1c; color: #ccc; font-family: 'Segoe UI', sans-serif; }
        .card { background: #141a2e; border: 1px solid #2a2f45; border-radius: 10px; }
        .card-header { background: #1c2340; border-bottom: 1px solid #2a2f45; font-weight: bold; color: #f0b90b; }
        .value { font-size: 1.8rem; font-weight: bold; }
        .green { color: #00d96b; } .red { color: #ff3750; } .gold { color: #f0b90b; }
        .btn-gold { background: #f0b90b; color: #0a0e1c; border: none; }
        .btn-outline-gold { border: 1px solid #f0b90b; color: #f0b90b; }
        .strategy-btn { width: 100%; margin-bottom: 5px; }
        .small-text { font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container-fluid py-3">
        <h2 class="text-center gold"><i class="bi bi-robot"></i> MOHA PRO ULTIMATE V31</h2>
        <p class="text-center text-muted small-text">Dashboard-ka Kormeerka & Maamulka Bot-ka MT4</p>
        
        <div class="row g-3 mt-2">
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-header"><i class="bi bi-wallet2"></i> Haraaga</div>
                    <div class="card-body"><span class="value" id="balance">0.00</span> USD</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-header"><i class="bi bi-graph-up"></i> Equity</div>
                    <div class="card-body"><span class="value" id="equity">0.00</span> USD</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-header"><i class="bi bi-cash-coin"></i> Faa'iido</div>
                    <div class="card-body"><span class="value" id="profit">0.00</span> USD</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-header"><i class="bi bi-percent"></i> Win Rate</div>
                    <div class="card-body"><span class="value" id="winrate">0.0%</span></div>
                </div>
            </div>
        </div>

        <div class="row g-3 mt-2">
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-header"><i class="bi bi-arrow-down-circle"></i> Drawdown</div>
                    <div class="card-body"><span class="value red" id="drawdown">0.0%</span></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-header"><i class="bi bi-briefcase"></i> Ganacsiyo Furran</div>
                    <div class="card-body"><span class="value gold" id="opentrades">0</span></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-header"><i class="bi bi-bar-chart"></i> Spread</div>
                    <div class="card-body"><span class="value" id="spread">-</span></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-header"><i class="bi bi-clock"></i> Cusboonaysiin</div>
                    <div class="card-body"><span id="lastUpdate">--</span></div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <!-- Strategy Control -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header"><i class="bi bi-sliders"></i> Beddel Istaraatiijiyadda</div>
                    <div class="card-body">
                        <button class="btn btn-sm btn-outline-gold strategy-btn" onclick="sendCommand('STRATEGY:SR')">SR - Support/Resistance</button>
                        <button class="btn btn-sm btn-outline-gold strategy-btn" onclick="sendCommand('STRATEGY:BB')">BB - Bollinger Bands</button>
                        <button class="btn btn-sm btn-outline-gold strategy-btn" onclick="sendCommand('STRATEGY:EMA')">EMA - Crossover</button>
                        <button class="btn btn-sm btn-outline-gold strategy-btn" onclick="sendCommand('STRATEGY:SMC')">SMC - Smart Money</button>
                        <button class="btn btn-sm btn-outline-gold strategy-btn" onclick="sendCommand('STRATEGY:VSA')">VSA - Volume</button>
                        <button class="btn btn-sm btn-outline-gold strategy-btn" onclick="sendCommand('STRATEGY:RSI')">RSI - Overbought/Oversold</button>
                    </div>
                </div>
            </div>

            <!-- General Commands -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header"><i class="bi bi-toggles"></i> Amarrada Guud</div>
                    <div class="card-body d-grid gap-2">
                        <button class="btn btn-success" onclick="sendCommand('START')"><i class="bi bi-play-fill"></i> Bilaab Bot-ka</button>
                        <button class="btn btn-danger" onclick="sendCommand('STOP')"><i class="bi bi-stop-fill"></i> Jooji Bot-ka</button>
                        <button class="btn btn-warning" onclick="sendCommand('CLOSE_ALL')"><i class="bi bi-x-circle"></i> Xidh Dhammaan Ganacsiyada</button>
                    </div>
                </div>
            </div>

            <!-- Risk & Lot Settings -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header"><i class="bi bi-gear"></i> Dejinta Khatarta & Lot-ka</div>
                    <div class="card-body">
                        <div class="mb-2">
                            <label class="form-label small">Risk Percent (%)</label>
                            <input type="number" id="riskPercent" class="form-control form-control-sm" value="2.0" step="0.1" min="0.1">
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">Lot-ka Aasaasiga ah</label>
                            <input type="number" id="initialLot" class="form-control form-control-sm" value="0.01" step="0.01" min="0.01">
                        </div>
                        <button class="btn btn-sm btn-gold" onclick="updateRiskSettings()">Cusboonaysii Dejinta</button>
                        <p id="commandMsg" class="mt-2 small-text"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Soo jiid xogta server-ka
        async function fetchData() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                document.getElementById('balance').innerText = Number(data.balance || 0).toFixed(2);
                document.getElementById('equity').innerText = Number(data.equity || 0).toFixed(2);
                const profit = Number(data.profit || 0);
                document.getElementById('profit').innerText = (profit >= 0 ? '+' : '') + profit.toFixed(2);
                document.getElementById('profit').className = 'value ' + (profit >= 0 ? 'green' : 'red');
                document.getElementById('winrate').innerText = Number(data.winrate || 0).toFixed(1) + '%';
                document.getElementById('drawdown').innerText = Number(data.drawdown || 0).toFixed(1) + '%';
                document.getElementById('opentrades').innerText = data.opentrades || 0;
                document.getElementById('spread').innerText = data.spread || '-';
                document.getElementById('lastUpdate').innerText = data.lastUpdate || new Date().toLocaleTimeString();
            } catch(e) {
                console.error('Khalad soo jiidashada xogta', e);
            }
        }

        // Amar u dir server-ka
        async function sendCommand(cmd) {
            try {
                await fetch('/api/setcommand', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                document.getElementById('commandMsg').innerText = 'Amar la diray: ' + cmd;
            } catch(e) {
                document.getElementById('commandMsg').innerText = 'Khalad!';
            }
        }

        // Cusboonaysii khatarta iyo lot-ka
        function updateRiskSettings() {
            const risk = document.getElementById('riskPercent').value;
            const lot = document.getElementById('initialLot').value;
            sendCommand(`SET_RISK:${risk},${lot}`);
        }

        // Cusbooneysii 2 ilbiriqsi kasta
        fetchData();
        setInterval(fetchData, 2000);
    </script>
</body>
</html>
