<!-- Ku dar qaybtaan script-ga dhammaadka body ka -->
<script>
// Function to update all stats from JSON data
function updateDashboard(data) {
    // Update summary cards
    document.querySelector('.stat-card:nth-child(1) .value').textContent = '$' + parseFloat(data.balance).toLocaleString('en-US', {minimumFractionDigits: 2});
    document.querySelector('.stat-card:nth-child(2) .value').textContent = '$' + parseFloat(data.equity).toLocaleString('en-US', {minimumFractionDigits: 2});
    const profitEl = document.querySelector('.stat-card:nth-child(3) .value');
    const profitVal = parseFloat(data.profit);
    profitEl.textContent = (profitVal >= 0 ? '+' : '') + '$' + profitVal.toFixed(2);
    profitEl.className = 'value ' + (profitVal >= 0 ? 'positive' : 'negative');
    document.querySelector('.stat-card:nth-child(4) .value').textContent = data.win_rate + '%';
    document.querySelector('.stat-card:nth-child(5) .value').textContent = data.drawdown + '%';
    document.querySelector('.stat-card:nth-child(6) .value').textContent = data.open_trades_count;
    const spreadVal = data.spread !== null ? data.spread : '-';
    document.querySelector('.stat-card:nth-child(7) .value').textContent = spreadVal;

    // Update time
    document.getElementById('updateTime').textContent = 'Cusboonaysiin: ' + data.update_time;

    // Update open trades table
    const openTableBody = document.querySelector('#openTradesTable tbody');
    openTableBody.innerHTML = '';
    if(data.open_trades && data.open_trades.length > 0) {
        data.open_trades.forEach(trade => {
            const row = `<tr class="open-trade">
                <td>${trade.symbol}</td>
                <td>${trade.type}</td>
                <td>${trade.lot}</td>
                <td>${trade.open_price}</td>
                <td>${trade.tp}</td>
                <td>${trade.sl}</td>
                <td class="${trade.profit >= 0 ? 'profit' : 'loss'}">${trade.profit >= 0 ? '+' : ''}$${parseFloat(trade.profit).toFixed(2)}</td>
                <td>${trade.swap}</td>
            </tr>`;
            openTableBody.innerHTML += row;
        });
    } else {
        openTableBody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#64748b;">Ma jiraan ganacsiyo furan</td></tr>';
    }
    document.querySelector('.section-title span:contains("furan")').textContent = data.open_trades.length + ' furan';

    // Update closed loss trades table
    const lossTableBody = document.querySelector('#closedLossTradesTable tbody');
    lossTableBody.innerHTML = '';
    if(data.closed_loss_trades && data.closed_loss_trades.length > 0) {
        data.closed_loss_trades.forEach(trade => {
            const row = `<tr>
                <td>${trade.symbol}</td>
                <td>${trade.type}</td>
                <td>${trade.lot}</td>
                <td>${trade.close_time}</td>
                <td>${trade.open_price}</td>
                <td>${trade.close_price}</td>
                <td class="loss">-$${Math.abs(parseFloat(trade.loss)).toFixed(2)}</td>
            </tr>`;
            lossTableBody.innerHTML += row;
        });
    } else {
        lossTableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#64748b;">Ma jiraan ganacsiyo khasaare ah</td></tr>';
    }

    // Symbol results
    const symbolContainer = document.querySelector('.symbol-results');
    symbolContainer.innerHTML = '';
    if(data.symbol_results && data.symbol_results.length > 0) {
        data.symbol_results.forEach(sym => {
            const card = `<div class="symbol-card">
                <div class="pair">${sym.pair}</div>
                <div class="stat">Ganacsiyo: ${sym.trades} | Guul: ${sym.wins}</div>
                <div class="pnl ${sym.pnl >= 0 ? 'positive' : 'loss'}">${sym.pnl >= 0 ? '+' : ''}$${parseFloat(sym.pnl).toFixed(2)}</div>
            </div>`;
            symbolContainer.innerHTML += card;
        });
    } else {
        symbolContainer.innerHTML = '<p>Ma jiraan wax natiijo ah</p>';
    }
}

// Fetch data every 5 seconds
function fetchLiveData() {
    fetch('/live_data')
        .then(response => response.json())
        .then(data => {
            updateDashboard(data);
        })
        .catch(error => console.error('Error fetching data:', error));
}

// Run on load and then every 5 seconds
fetchLiveData();
setInterval(fetchLiveData, 5000);
</script>
