<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHA PRO - Admin Panel</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0e17;color:#fff;font-family:Arial,sans-serif;padding:12px;max-width:500px;margin:0 auto}
        .header{background:linear-gradient(145deg,#1a1f2e,#232a3b);padding:15px;border-radius:12px;text-align:center;margin-bottom:14px;border:2px solid #f0a500}
        .header h2{color:#f0a500;font-size:18px}
        .header p{color:#888;font-size:10px;margin-top:4px}
        
        .control-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
        .btn{padding:14px;border-radius:10px;border:none;font-weight:700;font-size:12px;cursor:pointer;text-align:center}
        .btn-green{background:#10b981;color:#000}
        .btn-red{background:#ef4444;color:#fff}
        .btn-gold{background:#f0a500;color:#000}
        .btn-blue{background:#3b82f6;color:#fff}
        .btn-purple{background:#8b5cf6;color:#fff}
        .btn-gray{background:#374151;color:#fff}
        
        .section{margin-bottom:14px;background:#111827;border-radius:12px;padding:14px;border:1px solid #1e293b}
        .section h3{color:#f0a500;font-size:13px;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
        
        select,input{padding:10px;background:#0a0e17;border:1px solid #374151;color:#fff;border-radius:8px;font-size:11px;margin-bottom:8px}
        select{width:100%}
        .input-row{display:flex;gap:8px}
        .input-row input{flex:1}
        
        .status-box{background:#111827;border-radius:10px;padding:12px;margin-top:10px;border:1px solid #1e293b;text-align:center}
        .status-box .value{font-size:22px;font-weight:700;margin:5px 0}
        
        .log{background:#000;border-radius:8px;padding:10px;margin-top:10px;font-size:9px;color:#10b981;max-height:150px;overflow-y:auto;font-family:monospace}
        .log .error{color:#ef4444}
        .log .info{color:#f0a500}
    </style>
</head>
<body>

    <div class="header">
        <h2>🎛️ MOHA PRO ADMIN</h2>
        <p>Maamul Bot-kaaga • <span id="status">⏳ Xidhan</span></p>
    </div>

    <!-- Quick Controls -->
    <div class="control-grid">
        <button class="btn btn-green" onclick="sendCmd('START')">▶️ SHID TRADING</button>
        <button class="btn btn-red" onclick="sendCmd('STOP')">⏹️ DAM TRADING</button>
        <button class="btn btn-gold" onclick="sendCmd('CLOSE_ALL')">❌ XIDH DHAMMAAN</button>
        <button class="btn btn-purple" onclick="sendCmd('CLOSE_PROFIT')">💰 XIDH FAA'IIDO</button>
    </div>

    <!-- Strategy -->
    <div class="section">
        <h3>🎯 BEDDEL STRATEGY</h3>
        <select id="strategy" onchange="sendCmd('STRATEGY:'+this.value)">
            <option value="">-- Dooro Strategy --</option>
            <option value="SR">SR (Support/Resistance)</option>
            <option value="BB">Bollinger Bands</option>
            <option value="EMA">EMA Cross</option>
            <option value="SMC">Smart Money Concepts</option>
            <option value="VSA">Volume Spread Analysis</option>
            <option value="RSI">RSI Overbought/Oversold</option>
        </select>
    </div>

    <!-- Settings -->
    <div class="section">
        <h3>⚙️ BEDDEL SETTINGS</h3>
        <div class="input-row">
            <input type="number" id="lotSize" placeholder="Lot Size (0.01)" step="0.01">
            <input type="number" id="maxTrades" placeholder="Max Trades (20)">
        </div>
        <div class="input-row">
            <input type="number" id="slPips" placeholder="SL Pips (30)">
            <input type="number" id="tpPips" placeholder="TP Pips (80)">
        </div>
        <button class="btn btn-blue" style="width:100%" onclick="sendSettings()">💾 SAVE SETTINGS</button>
    </div>

    <!-- Status -->
    <div class="section">
        <h3>📊 XAALADDA HADDA</h3>
        <div class="status-box">
            <div>💰 Haraaga</div>
            <div class="value green" id="balance">$0.00</div>
        </div>
        <div class="status-box">
            <div>📈 Faa'iido Maanta</div>
            <div class="value" id="profit">$0.00</div>
        </div>
        <div class="status-box">
            <div>📋 Ganacsiyo Furan</div>
            <div class="value white" id="openTrades">0</div>
        </div>
    </div>

    <!-- Log -->
    <div class="section">
        <h3>📝 LOG</h3>
        <div class="log" id="log">Diyaar...<br></div>
    </div>

<script>
    function addLog(msg,type){
        let log=document.getElementById('log');
        let cls=type||'info';
        log.innerHTML+=`<span class="${cls}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
        log.scrollTop=log.scrollHeight;
    }

    function sendCmd(cmd){
        addLog(`Amar la diray: ${cmd}`);
        fetch('/command',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({command:cmd})
        }).then(r=>r.json()).then(d=>{
            addLog(`✅ ${d.message||'La fuliyay'}`,d.error?'error':'info');
        }).catch(e=>addLog('❌ Khalad: '+e,'error'));
    }

    function sendSettings(){
        let data={
            command:'SETTINGS',
            lot:document.getElementById('lotSize').value,
            maxtrades:document.getElementById('maxTrades').value,
            sl:document.getElementById('slPips').value,
            tp:document.getElementById('tpPips').value
        };
        addLog('Settings la diray...');
        fetch('/command',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(data)
        }).then(r=>r.json()).then(d=>{
            addLog('✅ Settings saved!');
        }).catch(e=>addLog('❌ Error','error'));
    }

    // Live data refresh
    setInterval(()=>{
        fetch('/api/data').then(r=>r.json()).then(d=>{
            document.getElementById('balance').textContent='$'+(d.balance||0).toFixed(2);
            document.getElementById('profit').textContent='$'+(d.profit||0).toFixed(2);
            document.getElementById('openTrades').textContent=d.opentrades||0;
            document.getElementById('status').innerHTML=d.trading?'🟢 SHAQEYN':'⏹️ XIDHAN';
        }).catch(()=>{});
    },2000);
</script>
</body>
</html>
